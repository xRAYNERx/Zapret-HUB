<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file:;">
  <title>Уведомление</title>
  <style>
    :root {
      --bg: #394250;
      --border: #4f5969;
      --text: #e8ecf2;
      --text-muted: #a4afc0;
      --accent: #22d3a8;
      --accent-muted: rgba(34, 211, 168, 0.12);

      --radius: 12px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: var(--font);
      user-select: none;
    }

    .notify {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      height: 100%;
      padding: 14px 16px;
      background: rgba(57, 66, 80, 0.96);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(14px);
      animation: notifyIn 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .notify-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--accent);
      background: var(--accent-muted);
    }

    .notify-icon-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
    }

    .notify-body {
      min-width: 0;
      flex: 1;
    }

    .notify-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .notify-message {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
    }

    @keyframes notifyIn {
      from { opacity: 0; transform: translateX(24px); }
      to { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="notify" role="status" aria-live="polite">
    <div class="notify-icon notify-icon-fallback" id="notifyIconWrap" aria-hidden="true">Z</div>
    <div class="notify-body">
      <div class="notify-title" id="notifyTitle">Zapret HUB</div>
      <div class="notify-message" id="notifyMessage"></div>
    </div>
  </div>

</body>
</html>
